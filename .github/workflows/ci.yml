name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up dependencies
      run: |
        sudo apt-get update
        wget https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh 18
        sudo apt-get install -y mlir-18-tools libmlir-18-dev
        pip install pygad numpy pandas

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build -j $(nproc)

    - name: Run Correctness Tests
      run: |
        cd tests
        python run_correctness.py

    - name: Run Microbenchmarks
      run: |
        ./build/bench_rolling --n 10000 --window 20 --iters 1000

    - name: Build & Run STAC-A2 Workload wrapper
      run: |
        # Generate synthetic data
        python scripts/generate_lobster.py build/lobster_sample.csv 10000
        # Run benchmark
        ./build/run_stac_a2 --data build/lobster_sample.csv
