name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install APT dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y llvm-18 mlir-18-tools libmlir-18-dev ccache

    - name: Install Python dependencies
      run: pip install pygad numpy pandas

    - name: Setup ccache
      uses: actions/cache@v4
      with:
        path: ~/.cache/ccache
        key: ${{ runner.os }}-ccache-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-ccache-

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

    - name: Build
      run: |
        ccache -z
        cmake --build build -j $(nproc)
        ccache -s

    - name: Run Correctness Tests
      run: |
        cd tests
        python run_correctness.py

    - name: Run Microbenchmarks
      run: |
        ./build/bench_rolling --n 10000 --window 20 --iters 1000

    - name: Build & Run STAC-A2 Workload wrapper
      run: |
        # Generate synthetic data
        python scripts/generate_lobster.py build/lobster_sample.csv 10000
        # Run benchmark
        ./build/run_stac_a2 --data build/lobster_sample.csv
